<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI School Handbook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; min-height: 100vh; }
    .hero { background: linear-gradient(135deg, #6f42c1, #0dcaf0); color: #fff; padding: 3rem 0; }
    #answer-card { display: none; }
    .source-badge { font-size: 0.85rem; }
    .spinner-border { display: none; }
    .loading .spinner-border { display: inline-block; }
    .loading #ask-btn-text { display: none; }
  </style>
</head>
<body>

  <!-- ===== Hero ===== -->
  <header class="hero text-center">
    <div class="container">
      <h1 class="fw-bold">AI School Handbook</h1>
      <p class="lead mb-0">Ask a question about the school handbook and get an answer with sources.</p>
    </div>
  </header>

  <main class="container py-4" style="max-width:760px;">

    <!-- ===== Upload Section ===== -->
    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Upload Handbook</h5>
        <p class="text-muted small">Upload a .txt file of your school handbook to build the knowledge base.</p>
        <form id="upload-form">
          <div class="mb-3">
            <input type="file" class="form-control" id="handbook-file" accept=".txt" required>
          </div>
          <button type="submit" class="btn btn-outline-primary" id="upload-btn">Upload &amp; Ingest</button>
          <span id="upload-status" class="ms-2 text-muted small"></span>
        </form>
      </div>
    </div>

    <!-- ===== Ask Section ===== -->
    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Ask a Question</h5>
        <form id="ask-form">
          <div class="input-group">
            <input type="text" class="form-control" id="question-input"
                   placeholder="e.g. What time does the library close on Fridays?" required>
            <button class="btn btn-primary" type="submit" id="ask-btn">
              <span id="ask-btn-text">Ask</span>
              <span class="spinner-border spinner-border-sm" role="status"></span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- ===== Answer Section ===== -->
    <div class="card mb-4" id="answer-card">
      <div class="card-body">
        <h5 class="card-title">Answer</h5>
        <p id="answer-text" class="mb-3"></p>

        <h6 class="text-muted">Sources</h6>
        <div id="sources-list"></div>
      </div>
    </div>

  </main>

  <footer class="text-center text-muted py-3 small">
    Built with Express + MongoDB + OpenAI &mdash; AI School Handbook Studio
  </footer>

  <script src="app.js"></script>
</body>
</html>
